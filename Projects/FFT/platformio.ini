; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
framework = arduino
lib_deps =
    kosme/arduinoFFT@^2.0.4

;[env:esp32dev]
;board = esp32dev


;[env:espwroom32]
;board = upesy_wroom


# Environment 1: The Sampler Application
[env:single_buffer]
board = upesy_wroom
;build_src_filter = +<sampler_app.cpp> +<common_lib.h> -<fft_app.cpp>
build_src_filter = +<single_buffer.cpp>
build_flags = -DAPP_NAME=\"Single\"


;pio run -e double_buffer -t upload
;platformio device monitor -b 115200
[env:double_buffer]
board = upesy_wroom
;build_src_filter = +<sampler_app.cpp> +<common_lib.h> -<fft_app.cpp>
build_src_filter = +<double_buffer.cpp>
build_flags = -DAPP_NAME=\"Double\"

[env:DAC_ADC]
board = upesy_wroom
;build_src_filter = +<sampler_app.cpp> +<common_lib.h> -<fft_app.cpp>
build_src_filter = +<DAC_ADC.cpp>
build_flags = -DAPP_NAME=\"DACADC\"


# Environment 2: The FFT Application
;[env:fft_only]
;build_src_filter = +<fft_app.cpp> +<common_lib.h> -<sampler_app.cpp>
;build_flags = -DAPP_NAME=\"FFT_ANALYZER\"